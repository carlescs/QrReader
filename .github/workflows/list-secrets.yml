name: List Repository Secrets

on:
  workflow_dispatch:

# workflow_dispatch can only be triggered by users with write access to the
# repository, so forks cannot trigger this workflow.
permissions:
  contents: read
  secrets: read

jobs:
  list-secrets:
    name: List secret names
    runs-on: ubuntu-latest
    # Extra defence-in-depth: abort immediately if someone other than the
    # repository owner manages to trigger this workflow.
    if: github.actor == 'carlescs'

    steps:
      - name: List repository secret names
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "### Repository secret names ###"
          gh secret list --repo "${{ github.repository }}"
